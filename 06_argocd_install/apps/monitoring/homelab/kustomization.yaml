apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # 1. Include the base application definitions
  - ../base/kube-prometheus-stack
  - ../base/loki

patches:
  # 2. Patch the kube-prometheus-stack base to use your values file
  - patch: |-
      - op: replace
        path: /spec/source/helm/valueFiles
        value:
        - $values/apps/monitoring/homelab/kube-prometheus-stack-values.yaml
    target:
      kind: Application
      name: kube-prometheus-stack

  # 3. Patch the loki base to use your values file
  - patch: |-
      - op: replace
        path: /spec/source/helm/valueFiles
        value:
        - $values/apps/monitoring/homelab/loki-values.yaml
    target:
      kind: Application
      name: loki
