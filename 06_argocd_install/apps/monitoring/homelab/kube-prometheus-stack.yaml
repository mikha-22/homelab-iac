# Your specific values for the kube-prometheus-stack chart

# ====================
# GRAFANA CONFIGURATION
# ====================
grafana:
  # Use a pre-existing secret for admin credentials (BEST PRACTICE)
  admin:
    existingSecret: grafana-admin-credentials # We will create this secret manually later
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: true
    storageClassName: "local-path"
    size: 10Gi
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts: ["grafana.milenika.dev"]
    annotations:
      external-dns.alpha.kubernetes.io/target: "e36ab9bf-8074-4886-ad3a-5b1cf5dce20a.cfargotunnel.com"
      external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
  # Add Loki as a datasource declaratively
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-gateway.monitoring.svc.cluster.local
      access: proxy
      isDefault: false

# ====================
# PROMETHEUS CONFIGURATION
# ====================
prometheus:
  prometheusSpec:
    retention: 30d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "local-path"
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

# Disable components we don't need for this setup
alertmanager:
  enabled: false
