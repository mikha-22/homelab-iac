---
- name: Install Docker and Build a K3s Kubernetes Cluster
  hosts: webservers
  become: yes

  tasks:
    # ===============================================
    # SECTION 1: INSTALL DOCKER (K8s Prerequisite)
    # ===============================================
    - name: Update apt package index
      apt:
        update_cache: yes

    - name: Install prerequisite packages for Docker
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Add Docker's official GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable
        state: present

    - name: Install Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Add user 'mikha' to the docker group for passwordless docker commands
      user:
        name: mikha
        groups: docker
        append: yes

    # ===============================================
    # SECTION 2: INSTALL K3S (The Kubernetes Cluster)
    # ===============================================
    - name: Check if K3s is already installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Download and install K3s
      shell: "curl -sfL https://get.k3s.io | sh -"
      when: not k3s_binary.stat.exists

    # ===============================================
    # SECTION 3: CONFIGURE KUBECTL FOR THE 'mikha' USER
    # ===============================================
    - name: Create .kube directory for user 'mikha'
      file:
        path: /home/mikha/.kube
        state: directory
        owner: mikha
        group: mikha
        mode: '0755'

    - name: Copy K3s config file to user's .kube directory and set permissions
      copy:
        remote_src: yes
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/mikha/.kube/config
        owner: mikha
        group: mikha
        mode: '0600'

    - name: Add KUBECONFIG environment variable to the user's .bashrc # <== NEW TASK
      lineinfile:
        path: /home/mikha/.bashrc
        line: 'export KUBECONFIG=~/.kube/config'
        create: yes
        owner: mikha
        group: mikha
