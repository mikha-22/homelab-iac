#cloud-config
# This cloud-init is for the Packer base template.
# It installs an SSH key that the Packer builder will use to connect.
ssh_pwauth: false
users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ${packer_ssh_public_key}
packages:
  - qemu-guest-agent
runcmd:
  - systemctl enable --now qemu-guest-agent
