---
- hosts: server
  vars:
    # Force Ansible to use the virtual environment Python interpreter
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  vars_prompt:
    - name: "cloudflare_tunnel_token"
      prompt: "Paste your Cloudflare Tunnel TOKEN here"
      private: yes
  tasks:
    - name: Create the tunnel token secret
      kubernetes.core.k8s:
        state: present
        definition:
          # This YAML is based directly on the guide's 'tunnel-token.yaml'
          apiVersion: v1
          kind: Secret
          metadata:
            name: tunnel-token
            namespace: default
          # stringData handles the base64 encoding for you automatically
          stringData:
            token: "{{ cloudflare_tunnel_token }}"
      delegate_to: localhost
      become: no
      vars:
        # Ensure the delegated task also uses the correct Python interpreter
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

    - name: Deploy cloudflared using a manual manifest
      kubernetes.core.k8s:
        state: present
        definition:
          # This YAML is based directly on the guide's 'tunnel.yaml'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: cloudflared-deployment
            namespace: default
          spec:
            replicas: 2
            selector:
              matchLabels:
                pod: cloudflared
            template:
              metadata:
                labels:
                  pod: cloudflared
              spec:
                containers:
                  - name: cloudflared
                    image: cloudflare/cloudflared:latest
                    # This section tells the pod to get its token from the secret
                    env:
                      - name: TUNNEL_TOKEN
                        valueFrom:
                          secretKeyRef:
                            name: tunnel-token
                            key: token
                    # These are the command-line arguments to run the tunnel
                    command:
                      - cloudflared
                      - tunnel
                      - --no-autoupdate
                      - run
      delegate_to: localhost
      become: no
      vars:
        # Ensure the delegated task also uses the correct Python interpreter
        ansible_python_interpreter: "{{ ansible_playbook_python }}"
