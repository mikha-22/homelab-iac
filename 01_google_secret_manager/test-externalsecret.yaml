apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: test-argocd-password
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: argocd-admin-secret
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      key: argocd-admin-password
