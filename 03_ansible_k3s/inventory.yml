---
k3s_cluster:
  children:
    server:
      hosts:
        192.168.1.81:
    agent:
      hosts:
        192.168.1.82:

  vars:
    # This is the user for SSH access
    ansible_user: mikha
    
    # Define the version of K3s to install
    k3s_version: "v1.29.5+k3s1"

    # Define the API endpoint for the cluster
    # This should be the IP of your primary server node
    api_endpoint: "192.168.1.81"  # <--- ADD THIS LINE

    # This is the k3s cluster secret token
    k3s_token: "a-very-secret-token"
