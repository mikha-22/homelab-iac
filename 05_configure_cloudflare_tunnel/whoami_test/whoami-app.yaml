# whoami-app.yaml

# 1. The Deployment for the whoami application (unchanged)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: default
  labels:
    app: whoami
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
        - name: whoami
          image: "containous/whoami"
          ports:
            - containerPort: 80

---

# 2. The Service (simple ClusterIP, unchanged)
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: whoami
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

---

# 3. Standard Kubernetes Ingress with the FINAL annotations
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whoami-ingress
  namespace: default
  annotations:
    # This tells ExternalDNS to point the CNAME record to our tunnel
    external-dns.alpha.kubernetes.io/target: "eabb0009-38d6-4998-b247-b687c6a59fae.cfargotunnel.com"

    # --- THIS IS THE FINAL, CRITICAL FIX ---
    # This tells ExternalDNS to enable the Cloudflare proxy (orange cloud).
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  rules:
  - host: whoami.milenika.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: whoami
            port:
              number: 80
