# whoami-app.yaml

# 1. The Deployment for the whoami application (unchanged)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: default
  labels:
    app: whoami
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
        - name: whoami
          image: "containous/whoami"
          ports:
            - containerPort: 80

---

# 2. The Service, with the CORRECT type and annotations
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: default
  annotations:
    # Tell ExternalDNS the hostname to create.
    external-dns.alpha.kubernetes.io/hostname: "whoami.milenika.dev"
    # Force ExternalDNS to create a CNAME record pointing to our tunnel.
    # This now works because there is no LoadBalancer IP to override it.
    external-dns.alpha.kubernetes.io/target: "7db2c74d-3a56-4085-8f84-cdb9efb8f17e.cfargotunnel.com"
spec:
  # --- THE CRITICAL CHANGE ---
  # This service only needs to be reachable inside the cluster by Traefik.
  # ClusterIP is the correct type and avoids publishing node IPs.
  type: ClusterIP
  selector:
    app: whoami
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

---

# 3. The IngressRoute, for Traefik's internal routing (unchanged)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoami-ingress
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`whoami.milenika.dev`)
      kind: Rule
      services:
        - name: whoami
          port: 80
